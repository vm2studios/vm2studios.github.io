<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Mini SandBox</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="shortcut icon" type="image/png" href="./favicon.png">
    <script src="./Mini Sandbox.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 1280px;  /* Исходная ширина игры */
            height: 704px;  /* Исходная высота игры */
            transform-origin: center center;
        }

        #openfl-content {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-origin: center center;
            background: #000000;
        }

        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <noscript>This webpage makes extensive use of JavaScript. Please enable JavaScript in your web browser to view this page.</noscript>

    <div id="game-container">
        <div id="loading-overlay">
            <div id="progress">Loading game...</div>
        </div>
        <div id="openfl-content"></div>
    </div>

    <script>
        // Функция для расчета и применения масштаба - ПРОСТАЯ И РАБОЧАЯ
        function resizeGame() {
            var container = document.getElementById('game-container');
            if (!container) return;

            // Размеры окна
            var windowWidth = window.innerWidth;
            var windowHeight = window.innerHeight;

            // Исходные размеры игры
            var gameWidth = 1280;
            var gameHeight = 704;

            // Рассчитываем масштаб
            var scaleX = windowWidth / gameWidth;
            var scaleY = windowHeight / gameHeight;
            var scale = Math.min(scaleX, scaleY);

            // Применяем масштаб и центрирование
            container.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
            container.style.position = 'absolute';
            container.style.left = '50%';
            container.style.top = '50%';
            
            console.log("Game scaled to: " + (scale * 100).toFixed(2) + "%");
        }

        // Инициализация игры после загрузки
        window.addEventListener('load', function () {
            console.log("Window loaded");
            
            // Сначала настраиваем размеры
            resizeGame();

            // Запускаем игру
            if (typeof lime !== 'undefined' && lime.embed) {
                lime.embed("Mini Sandbox", "openfl-content", 1280, 704, {
                    parameters: {}
                });

                // Скрываем загрузочный экран через небольшую задержку
                setTimeout(function () {
                    var loading = document.getElementById('loading-overlay');
                    if (loading) {
                        loading.style.display = 'none';
                    }
                    console.log("Loading screen hidden");
                }, 2000);
            } else {
                console.error("lime is not defined");
                // Если lime не загрузился, все равно скрываем загрузку
                setTimeout(function () {
                    var loading = document.getElementById('loading-overlay');
                    if (loading) {
                        loading.style.display = 'none';
                    }
                }, 3000);
            }
        });

        // Обработчик изменения размера окна
        window.addEventListener('resize', resizeGame);
        window.addEventListener('orientationchange', function () {
            setTimeout(resizeGame, 100);
        });

        // Предотвращаем скроллинг при касании
        document.addEventListener('touchmove', function (event) {
            event.preventDefault();
        }, { passive: false });

        // Инициализируем при загрузке DOM
        document.addEventListener('DOMContentLoaded', function() {
            console.log("DOM loaded");
            resizeGame();
        });
    </script>
</body>
</html>
